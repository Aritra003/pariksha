[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
remappings = [
  "@openzeppelin/=lib/openzeppelin-contracts/",
  "forge-std/=lib/forge-std/src/"
]

[rpc_endpoints]
sepolia = "${NEXT_PUBLIC_SEPOLIA_RPC}"
base_sepolia = "${NEXT_PUBLIC_BASE_SEPOLIA_RPC}"
zerog_galileo = "${NEXT_PUBLIC_ZEROG_GALILEO_RPC}"
